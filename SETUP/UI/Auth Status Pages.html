<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zeemic · Auth Status & Error Pages</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="tokens.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body, #root { margin: 0; padding: 0; min-height: 100%; background: var(--zm-paper); }
    body { font-family: 'Geist', -apple-system, sans-serif; }
    @keyframes zm-transit {
      0%   { left: 0;   opacity: 0; transform: scale(0.5); }
      20%  { opacity: 1; transform: scale(1); }
      80%  { opacity: 1; transform: scale(1); }
      100% { left: calc(100% - 6px); opacity: 0; transform: scale(0.5); }
    }
    @keyframes zm-pulse { 0%, 100% { opacity: 0.35; transform: scale(0.7); } 50% { opacity: 1; transform: scale(1); } }
    @keyframes zm-pop { 0% { transform: scale(0.4); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes zm-fade-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: no-preference) {
      .zm-pop { animation: zm-pop 420ms var(--zm-ease) both; }
      .zm-fade-up { animation: zm-fade-up 360ms var(--zm-ease) both; }
    }
  </style>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#11211A">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#11211A"/>
      <circle cx="600" cy="330" r="120" fill="none" stroke="#F2C94C" stroke-width="14"/>
      <path d="M548 330 l38 40 70 -82" fill="none" stroke="#F5F1E8" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="600" y="600" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="56" fill="#F5F1E8">status &amp; errors</text>
      <text x="600" y="664" text-anchor="middle" font-family="Helvetica, sans-serif" font-size="22" fill="rgba(245,241,232,0.6)" letter-spacing="5">LOADING · SUCCESS · ERROR · 404 · 500</text>
    </svg>
  </template>
  <div id="root"></div>

  <script src="data.js"></script>
  <script type="text/babel" src="brand.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="atomic.jsx"></script>
  <script type="text/babel" src="auth-status.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    // ════════════════════════════════════════════════════════════
    // Zeemic — OAuth Callback + Global Error pages
    // Two pages, each with a state/variant switcher so every state
    // in the spec is explorable side-by-side.
    // ════════════════════════════════════════════════════════════

    // ── Small segmented control used by the demo chrome ──────────
    function Segmented({ options, value, onChange, tone = 'default' }) {
      return (
        <div style={{ display: 'inline-flex', gap: 3, padding: 3, background: 'var(--zm-white)', borderRadius: 'var(--zm-r-full)', border: '1px solid var(--zm-border)' }}>
          {options.map(o => {
            const active = o.id === value;
            const activeBg = tone === 'state'
              ? ({ loading: 'var(--zm-ink-900)', success: 'var(--zm-success)', error: 'var(--zm-coral-500)' }[o.id] || 'var(--zm-ink-900)')
              : 'var(--zm-ink-900)';
            return (
              <button key={o.id} onClick={() => onChange(o.id)} style={{
                padding: '7px 15px', borderRadius: 'var(--zm-r-full)', border: 'none', cursor: 'pointer',
                background: active ? activeBg : 'transparent',
                color: active ? 'var(--zm-paper)' : 'var(--zm-ink-900)',
                font: `${active ? 600 : 500} 12.5px var(--zm-font-body)`, whiteSpace: 'nowrap',
                transition: 'all 120ms var(--zm-ease)',
              }}>{o.label}</button>
            );
          })}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    // PAGE 1 · OAuth Callback  (/auth/callback)
    // ════════════════════════════════════════════════════════════
    const CALLBACK_STEPS = [
      { label: 'Validating security token' },
      { label: 'Exchanging authorization code' },
      { label: 'Establishing your session' },
    ];

    // Error reasons the callback can surface.
    const OAUTH_ERRORS = {
      state_mismatch: {
        label: 'State mismatch',
        title: <>Security check <em style={{ fontStyle: 'italic' }}>failed.</em></>,
        alert: 'The state token from the provider didn\u2019t match what we issued. To protect your account we stopped the sign-in.',
        code: 'ERR_OAUTH_STATE_MISMATCH',
        failAt: 0,
      },
      access_denied: {
        label: 'Access denied',
        title: <>Permission <em style={{ fontStyle: 'italic' }}>declined.</em></>,
        alert: 'You cancelled the request, or the provider declined to share your account details. No data was exchanged.',
        code: 'ERR_OAUTH_ACCESS_DENIED',
        failAt: 0,
      },
      missing_code: {
        label: 'Missing code',
        title: <>Something went <em style={{ fontStyle: 'italic' }}>missing.</em></>,
        alert: 'The provider redirected back without an authorization code, so we have nothing to exchange. This is usually temporary.',
        code: 'ERR_OAUTH_NO_CODE',
        failAt: 1,
      },
      server_error: {
        label: 'Backend rejected',
        title: <>We hit a <em style={{ fontStyle: 'italic' }}>snag.</em></>,
        alert: 'We couldn\u2019t complete the token exchange with the provider. Our team has been notified automatically.',
        code: 'ERR_OAUTH_EXCHANGE_500',
        failAt: 1,
      },
      network: {
        label: 'Network',
        title: <>Connection <em style={{ fontStyle: 'italic' }}>dropped.</em></>,
        alert: 'We lost the connection while finishing your sign-in. Check your network and try again \u2014 nothing was charged or changed.',
        code: 'ERR_OAUTH_NETWORK',
        failAt: 2,
      },
    };

    function OAuthCallbackPage() {
      const [state, setState] = React.useState('loading');   // loading | success | error
      const [auto, setAuto] = React.useState(true);          // auto-progress the loading demo
      const [step, setStep] = React.useState(0);
      const [errKey, setErrKey] = React.useState('state_mismatch');
      const [countdown, setCountdown] = React.useState(3);
      const provider = 'google';

      // Auto-progress loading -> success
      React.useEffect(() => {
        if (state !== 'loading' || !auto) return;
        setStep(0);
        const t1 = setTimeout(() => setStep(1), 1100);
        const t2 = setTimeout(() => setStep(2), 2300);
        const t3 = setTimeout(() => { setStep(3); setState('success'); }, 3500);
        return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
      }, [state, auto]);

      // Success redirect countdown
      React.useEffect(() => {
        if (state !== 'success') { setCountdown(3); return; }
        if (countdown <= 0) return;
        const t = setTimeout(() => setCountdown(c => c - 1), 1000);
        return () => clearTimeout(t);
      }, [state, countdown]);

      const setStateManual = (s) => { setAuto(false); setState(s); if (s === 'loading') { setStep(1); } };
      const replay = () => { setAuto(true); setState('loading'); };

      const err = OAUTH_ERRORS[errKey];
      const reqId = 'req_4f9c-' + (errKey === 'network' ? 'a17e' : '8b02');

      return (
        <div>
          <DemoBar
            path="/auth/callback"
            note="Page just mounted after the provider redirect — validating, then exchanging the code for a session."
            controls={
              <div style={{ display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap' }}>
                <Segmented
                  tone="state"
                  value={state}
                  onChange={setStateManual}
                  options={[{ id: 'loading', label: 'Loading' }, { id: 'success', label: 'Success' }, { id: 'error', label: 'Error' }]}
                />
                {state === 'loading' && <ZmButton variant="ghost" size="sm" icon="play" onClick={replay}>Replay</ZmButton>}
                {state === 'error' && (
                  <div style={{ display: 'inline-flex', gap: 4, padding: 3, background: 'var(--zm-white)', borderRadius: 'var(--zm-r-full)', border: '1px solid var(--zm-border)' }}>
                    {Object.entries(OAUTH_ERRORS).map(([k, v]) => (
                      <button key={k} onClick={() => setErrKey(k)} style={{
                        padding: '6px 11px', borderRadius: 'var(--zm-r-full)', border: 'none', cursor: 'pointer',
                        background: k === errKey ? 'var(--zm-coral-500)' : 'transparent',
                        color: k === errKey ? 'var(--zm-paper)' : 'var(--zm-fg-muted)',
                        font: `${k === errKey ? 600 : 500} 12px var(--zm-font-body)`, whiteSpace: 'nowrap',
                      }}>{v.label}</button>
                    ))}
                  </div>
                )}
              </div>
            }
          />

          <StatusShell footer={<>{PROVIDER_LABEL[provider]} · zeemic.com/auth/callback · {reqId}</>}>
            {state === 'loading' && (
              <div key="loading">
                <ExchangeVisual provider={provider} state="loading" />
                <div className="zm-eyebrow" style={{ textAlign: 'center' }}>Signing you in</div>
                <h1 style={{ fontFamily: 'var(--zm-font-display)', fontSize: 34, lineHeight: 1.05, letterSpacing: '-0.025em', margin: '8px 0 8px', textAlign: 'center' }}>
                  Completing sign-in<span style={{ animation: 'zm-pulse 1.2s ease-in-out infinite' }}>…</span>
                </h1>
                <p style={{ font: '400 14px/1.55 var(--zm-font-body)', color: 'var(--zm-fg-muted)', margin: '0 auto 22px', textAlign: 'center', maxWidth: 320 }}>
                  Finishing your <strong style={{ color: 'var(--zm-ink-950)' }}>{PROVIDER_LABEL[provider]}</strong> sign-in. This usually takes a couple of seconds — please keep this tab open.
                </p>
                <div style={{ borderTop: '1px solid var(--zm-border)', paddingTop: 8 }}>
                  <StepList steps={CALLBACK_STEPS} current={step} />
                </div>
              </div>
            )}

            {state === 'success' && (
              <div key="success" style={{ textAlign: 'center' }}>
                <div className="zm-pop" style={{ display: 'flex', justifyContent: 'center', marginBottom: 22 }}>
                  <ExchangeVisual provider={provider} state="success" />
                </div>
                <div className="zm-eyebrow" style={{ color: 'var(--zm-success)' }}>Session established</div>
                <h1 style={{ fontFamily: 'var(--zm-font-display)', fontSize: 36, lineHeight: 1.04, letterSpacing: '-0.025em', margin: '8px 0 8px' }}>
                  Signed in <em style={{ fontStyle: 'italic' }}>successfully.</em>
                </h1>
                <p style={{ font: '400 14px/1.55 var(--zm-font-body)', color: 'var(--zm-fg-muted)', margin: '0 auto 24px', maxWidth: 330 }}>
                  Welcome back, <strong style={{ color: 'var(--zm-ink-950)' }}>Enoch</strong>. We’ve set up your session — taking you to your dashboard now.
                </p>
                <ZmButton variant="primary" size="lg" full iconRight="arrow_right">Continue to dashboard</ZmButton>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, marginTop: 16, font: '500 12.5px var(--zm-font-body)', color: 'var(--zm-fg-muted)' }}>
                  <span style={{ position: 'relative', display: 'inline-flex', width: 18, height: 18 }}>
                    <ZmLoader size={18} color="var(--zm-ink-400)" />
                  </span>
                  Redirecting in <span className="zm-num-tab" style={{ color: 'var(--zm-ink-950)', fontWeight: 600 }}>{Math.max(0, countdown)}s</span>
                </div>
              </div>
            )}

            {state === 'error' && (
              <div key={'error-' + errKey} className="zm-fade-up" style={{ textAlign: 'center' }}>
                <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 22 }}>
                  <ExchangeVisual provider={provider} state="error" />
                </div>
                <div className="zm-eyebrow" style={{ color: 'var(--zm-coral-600)' }}>Sign-in stopped</div>
                <h1 style={{ fontFamily: 'var(--zm-font-display)', fontSize: 36, lineHeight: 1.04, letterSpacing: '-0.025em', margin: '8px 0 14px' }}>
                  {err.title}
                </h1>
                <ZmAlert tone="danger" icon="close" style={{ textAlign: 'left', marginBottom: 22 }}>
                  {err.alert}
                </ZmAlert>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  <ZmButton variant="primary" size="lg" full icon="arrow_right">Try signing in again</ZmButton>
                  <ZmButton variant="ghost" size="md" full icon="chevron_left">Back to sign-in</ZmButton>
                </div>
                <div style={{ marginTop: 20, paddingTop: 16, borderTop: '1px solid var(--zm-border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}>
                  <span style={{ font: '500 11px var(--zm-font-mono)', color: 'var(--zm-fg-subtle)', letterSpacing: '0.04em' }}>{err.code}</span>
                  <a style={{ font: '500 12px var(--zm-font-body)', color: 'var(--zm-ink-700)', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                    Contact support <ZmIcon name="arrow_up_right" size={13} color="var(--zm-ink-700)" />
                  </a>
                </div>
              </div>
            )}
          </StatusShell>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    // PAGE 2 · Global Error page
    // Editorial: oversized serif code watermark + concise recovery.
    // ════════════════════════════════════════════════════════════
    const GLOBAL_ERRORS = {
      '404': {
        code: '404', tone: 'neutral', icon: 'search',
        eyebrow: 'Page not found',
        title: <>This page took a <em style={{ fontStyle: 'italic' }}>wrong turn.</em></>,
        body: 'The link may be broken, or the page may have moved. Let\u2019s get you back to somewhere useful.',
        primary: { label: 'Back to marketplace', icon: 'arrow_right' },
        secondary: { label: 'Search listings', icon: 'search' },
        ref: 'ref_9a2f-404',
      },
      '500': {
        code: '500', tone: 'error', icon: 'bolt',
        eyebrow: 'Server error',
        title: <>Something broke on <em style={{ fontStyle: 'italic' }}>our end.</em></>,
        body: 'This one\u2019s on us. The team has been notified automatically. Try again in a moment, or head back home.',
        primary: { label: 'Try again', icon: 'arrow_right' },
        secondary: { label: 'Back to home', icon: 'chevron_left' },
        ref: 'ref_3c8b-500',
      },
      '403': {
        code: '403', tone: 'warning', icon: 'user',
        eyebrow: 'Access denied',
        title: <>You don’t have <em style={{ fontStyle: 'italic' }}>access</em> here.</>,
        body: 'Your account isn\u2019t permitted to view this page. If you think this is a mistake, sign in with a different account or ask an admin for access.',
        primary: { label: 'Sign in', icon: 'arrow_right' },
        secondary: { label: 'Back to home', icon: 'chevron_left' },
        ref: 'ref_71de-403',
      },
      'maintenance': {
        code: '503', tone: 'warning', icon: 'wrench',
        eyebrow: 'Scheduled maintenance',
        title: <>Down for a <em style={{ fontStyle: 'italic' }}>quick tune-up.</em></>,
        body: 'We\u2019re shipping an upgrade and will be back shortly. Bookings and payments resume automatically — nothing is lost.',
        primary: { label: 'Check status page', icon: 'arrow_up_right' },
        secondary: { label: 'Retry now', icon: 'arrow_right' },
        ref: 'maint_2026-06-06',
      },
      'offline': {
        code: '⚲', tone: 'neutral', icon: 'globe',
        eyebrow: 'No connection',
        title: <>You’re <em style={{ fontStyle: 'italic' }}>offline.</em></>,
        body: 'We can\u2019t reach Zeemic right now. Check your internet connection and try again — your draft is saved locally.',
        primary: { label: 'Retry', icon: 'arrow_right' },
        secondary: { label: 'Back to home', icon: 'chevron_left' },
        ref: 'net_offline',
      },
    };

    function GlobalErrorPage() {
      const [key, setKey] = React.useState('404');
      const e = GLOBAL_ERRORS[key];
      const accent = { neutral: 'var(--zm-ink-300)', error: 'var(--zm-coral-400)', warning: 'var(--zm-gold-400)' }[e.tone];

      return (
        <div>
          <DemoBar
            path="/error"
            note="Catch-all error surface — rendered for unmatched routes, 5xx responses, blocked access, or lost connectivity."
            controls={
              <Segmented
                value={key}
                onChange={setKey}
                options={[
                  { id: '404', label: '404' },
                  { id: '500', label: '500' },
                  { id: '403', label: '403' },
                  { id: 'maintenance', label: 'Maintenance' },
                  { id: 'offline', label: 'Offline' },
                ]}
              />
            }
          />

          <div style={{ minHeight: 'calc(100vh - 60px)', display: 'grid', gridTemplateColumns: '1.05fr 1fr', alignItems: 'stretch' }}>
            {/* Left — dark editorial panel with oversized code */}
            <div style={{ background: 'var(--zm-ink-950)', color: 'var(--zm-paper)', padding: '56px 60px', display: 'flex', flexDirection: 'column', position: 'relative', overflow: 'hidden' }}>
              <div aria-hidden style={{ position: 'absolute', right: -30, bottom: -120, fontFamily: 'var(--zm-font-display)', fontSize: 520, lineHeight: 0.8, color: 'rgba(245,241,232,0.05)', letterSpacing: '-0.04em', pointerEvents: 'none', userSelect: 'none' }}>
                {e.code}
              </div>
              <ZmWordmark height={26} color="var(--zm-paper)" />
              <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', position: 'relative' }}>
                <div key={key} className="zm-fade-up" style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
                  <span style={{ fontFamily: 'var(--zm-font-display)', fontSize: 200, lineHeight: 0.86, letterSpacing: '-0.04em', color: 'var(--zm-paper)' }}>{e.code}</span>
                  <span style={{ width: 16, height: 16, borderRadius: 8, background: accent, transform: 'translateY(-18px)', flexShrink: 0 }} />
                </div>
                <div className="zm-eyebrow" style={{ color: accent, marginTop: 10 }}>{e.eyebrow}</div>
              </div>
              <div style={{ font: '400 11px var(--zm-font-mono)', color: 'var(--zm-fg-on-dark-muted)', letterSpacing: '0.05em' }}>
                © 2026 ZEEMIC · {e.ref}
              </div>
            </div>

            {/* Right — recovery content on paper */}
            <div style={{ padding: '56px 60px', display: 'flex', alignItems: 'center', background: 'var(--zm-paper)' }}>
              <div key={key} className="zm-fade-up" style={{ maxWidth: 420 }}>
                <StateMedallion tone={e.tone} icon={e.icon} size={68} />
                <h1 style={{ fontFamily: 'var(--zm-font-display)', fontSize: 48, lineHeight: 1.02, letterSpacing: '-0.03em', margin: '24px 0 14px' }}>
                  {e.title}
                </h1>
                <p style={{ font: '400 16px/1.6 var(--zm-font-body)', color: 'var(--zm-fg-muted)', margin: '0 0 28px' }}>
                  {e.body}
                </p>
                <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                  <ZmButton variant="primary" size="lg" iconRight={e.primary.icon}>{e.primary.label}</ZmButton>
                  <ZmButton variant="secondary" size="lg" icon={e.secondary.icon}>{e.secondary.label}</ZmButton>
                </div>
                <div style={{ marginTop: 30, paddingTop: 20, borderTop: '1px solid var(--zm-border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12 }}>
                  <span style={{ font: '400 12px var(--zm-font-body)', color: 'var(--zm-fg-muted)' }}>
                    Still stuck? Share this code with support.
                  </span>
                  <span style={{ font: '500 11px var(--zm-font-mono)', color: 'var(--zm-ink-700)', background: 'var(--zm-ink-50)', padding: '5px 9px', borderRadius: 'var(--zm-r-sm)', letterSpacing: '0.03em', whiteSpace: 'nowrap' }}>{e.ref}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Demo chrome — shows route + behaviour note + state controls ─
    function DemoBar({ path, note, controls }) {
      return (
        <div style={{
          background: 'rgba(245,241,232,0.92)', backdropFilter: 'blur(10px)',
          borderBottom: '1px solid var(--zm-border)', padding: '12px 24px',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 20, flexWrap: 'wrap',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, minWidth: 0 }}>
            <span style={{ font: '500 12px var(--zm-font-mono)', color: 'var(--zm-ink-700)', background: 'var(--zm-white)', border: '1px solid var(--zm-border)', padding: '5px 10px', borderRadius: 'var(--zm-r-sm)', whiteSpace: 'nowrap' }}>GET {path}</span>
            <span style={{ font: '400 12.5px var(--zm-font-body)', color: 'var(--zm-fg-muted)', maxWidth: 460 }}>{note}</span>
          </div>
          {controls}
        </div>
      );
    }

    // ── Top page nav ─────────────────────────────────────────────
    const PAGES = [
      { id: 'callback', label: 'OAuth callback' },
      { id: 'error', label: 'Global error' },
    ];

    function App() {
      const [page, setPage] = React.useState(() => {
        const h = location.hash.replace('#', '');
        return PAGES.find(p => p.id === h) ? h : 'callback';
      });
      React.useEffect(() => {
        const handler = () => {
          const h = location.hash.replace('#', '');
          if (PAGES.find(p => p.id === h)) setPage(h);
        };
        window.addEventListener('hashchange', handler);
        return () => window.removeEventListener('hashchange', handler);
      }, []);
      React.useEffect(() => {
        if (location.hash.replace('#', '') !== page) location.hash = '#' + page;
      }, [page]);

      return (
        <div className="zm-root" style={{ minHeight: '100vh', background: 'var(--zm-paper)' }}>
          <div style={{
            position: 'sticky', top: 0, zIndex: 20,
            background: 'rgba(245,241,232,0.94)', backdropFilter: 'blur(12px)',
            borderBottom: '1px solid var(--zm-border)', padding: '12px 24px',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
              <ZmWordmark height={22} />
              <span style={{ width: 1, height: 20, background: 'var(--zm-border)' }} />
              <span style={{ font: '500 13px var(--zm-font-body)', color: 'var(--zm-fg-muted)' }}>Status &amp; error pages</span>
            </div>
            <div style={{ display: 'flex', gap: 4, padding: 4, background: 'var(--zm-white)', borderRadius: 'var(--zm-r-full)', border: '1px solid var(--zm-border)' }}>
              {PAGES.map(p => (
                <button key={p.id} onClick={() => setPage(p.id)} style={{
                  padding: '8px 18px', borderRadius: 'var(--zm-r-full)', border: 'none',
                  background: p.id === page ? 'var(--zm-ink-900)' : 'transparent',
                  color: p.id === page ? 'var(--zm-paper)' : 'var(--zm-ink-900)',
                  font: `${p.id === page ? 600 : 500} 13px var(--zm-font-body)`, cursor: 'pointer', whiteSpace: 'nowrap',
                }}>{p.label}</button>
              ))}
            </div>
          </div>
          {page === 'callback' ? <OAuthCallbackPage /> : <GlobalErrorPage />}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
